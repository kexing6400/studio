name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.json'
      - '**.md'
      - '!.git/**'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - run: npm ci
      
      # Only lint if there are lintable files
      - name: Run ESLint
        run: |
          if ls projects/*/src/**/*.ts 2>/dev/null | head -1 | grep -q .; then
            npm run lint --workspaces --if-present
          else
            echo "No TypeScript files to lint"
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - run: npm ci
      
      # Only test if there are test files
      - name: Run Tests
        run: |
          if ls projects/*/tests/**/*.ts 2>/dev/null | head -1 | grep -q .; then
            npm test --workspaces --if-present
          else
            echo "No test files found"
          fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image for demo project
        run: |
          if [ -d projects/taskmaster-api ]; then
            docker build \
              --tag studio-demo:${{ github.sha }} \
              --tag studio-demo:latest \
              projects/taskmaster-api/
          else
            echo "No Dockerfile to build"
          fi

  pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages-${{ github.ref }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, docker, pages]
    if: always()
    steps:
      - name: Check quality gates
        run: |
          echo "Quality Gate Results:"
          echo "  Lint: ${{ needs.lint.result }}"
          echo "  Test: ${{ needs.test.result }}"
          echo "  Docker: ${{ needs.docker.result }}"
          echo "  Pages: ${{ needs.pages.result }}"
          
          if [[ "${{ needs.lint.result }}" == "success" ]] || [[ "${{ needs.lint.result }}" == "skipped" ]]; then
            if [[ "${{ needs.docker.result }}" == "success" ]] || [[ "${{ needs.docker.result }}" == "skipped" ]]; then
              if [[ "${{ needs.pages.result }}" == "success" ]]; then
                echo "✅ All required checks passed"
                exit 0
              fi
            fi
          fi
          echo "❌ Quality gate failed"
          exit 1
